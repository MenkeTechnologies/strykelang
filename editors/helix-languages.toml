# Helix editor configuration for forge
# Add to ~/.config/helix/languages.toml

[[language]]
name = "forge"
scope = "source.perl"
injection-regex = "forge"
file-types = ["pr"]
comment-token = "#"
indent = { tab-width = 4, unit = "    " }
language-servers = ["forge"]

[language-server.forge]
command = "fo"
args = ["--lsp"]

# Also use forge for regular .pl/.pm files
[[language]]
name = "perl"
language-servers = ["forge"]
