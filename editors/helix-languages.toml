# Helix editor configuration for stryke
# Add to ~/.config/helix/languages.toml

[[language]]
name = "stryke"
scope = "source.perl"
injection-regex = "stryke"
file-types = ["pr"]
comment-token = "#"
indent = { tab-width = 4, unit = "    " }
language-servers = ["stryke"]

[language-server.stryke]
command = "fo"
args = ["--lsp"]

# Also use stryke for regular .pl/.pm files
[[language]]
name = "perl"
language-servers = ["stryke"]
