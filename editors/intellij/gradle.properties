pluginGroup=com.menketechnologies.stryke
pluginName=stryke-intellij
pluginRepositoryUrl=https://github.com/MenkeTechnologies/strykelang

# Bumped in lockstep with strykelang Cargo.toml (currently 0.14.4)
pluginVersion=0.14.5

# Supported IDE range. 2024.2 = build 242. LSP API is paid-IDE only.
pluginSinceBuild=242
pluginUntilBuild=261.*

platformType=IU
platformVersion=2024.2.4

# JVM
javaVersion=17

kotlin.code.style=official
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configuration-cache=true
org.gradle.jvmargs=-Xmx2g -XX:+UseG1GC
