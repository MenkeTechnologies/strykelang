# Auto-generated by `s_web build`. Wrapper crate that links the stryke
# runtime statically and ships your whole app as a single binary.
[workspace]

[package]
name = "{{app_name}}"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "{{app_name}}"
path = "src/main.rs"

[dependencies]
strykelang = { path = "{{strykelang_path}}" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
