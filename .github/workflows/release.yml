name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.16.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # strykelang is large enough that even native aarch64 release builds
    # run past 60min on first run (cold cache, fresh deps). 180 across
    # the board prevents per-target timeout cancellations.
    timeout-minutes: 180
    # Known-flaky targets (continue-on-error: true) don't block the
    # downstream publish + homebrew jobs when they fail. Build conclusion
    # still shows red, but `needs: build` is satisfied so the tap can ship.
    continue-on-error: ${{ matrix.allow_failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            # musl: glibc-only fortified symbols (__snprintf_chk etc.) in
            # libcrypt.a — pre-existing blocker, not a regression.
            allow_failure: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            # Native aarch64 GHA runner — switched off cross-rs after
            # repeated build-infra failures (Docker image fetch / glibc
            # version mismatches). Native arm runner gets modern gcc +
            # apt without the cross-rs container layer.
            # allow_failure: true here because the runner repeatedly
            # crashes mid-link with "runner lost communication with
            # server" + a `null` conclusion on the Build (native) step
            # even after the 8 GB swap + reduce-memory-overheads
            # linker flags (v0.16.20-.22 all blocked publish on this
            # one matrix entry). The Homebrew formula's on_linux/on_arm
            # block currently ships an empty sha256 anyway (no aarch64
            # Linux binary since at least v0.16.6), so allowing this
            # to fail matches reality and stops blocking the publish
            # job on a target the formula doesn't actually deliver.
            # Revisit once the runner instability is root-caused.
            allow_failure: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl') && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install native deps for aarch64-linux-gnu (build toolchain)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Add swapfile for aarch64-linux-gnu link step
        # ubuntu-24.04-arm runners ship ~7 GB RAM, which the final
        # linker process exceeds on 463k-LOC trees and the runner is
        # OOM-killed (manifests as "hosted runner lost communication"
        # after ~1h). 8 GB of swap is the standard arm-runner
        # workaround and lets the link complete without falling back
        # to cross-rs.
        #
        # The runner ships with a pre-mounted /swapfile (4 GB), so
        # fallocate on it returns "Text file busy". swapoff + rm
        # first, then recreate at 8 GB. dd is preferred over
        # fallocate because some runner filesystems reject fallocate
        # on swap-flagged inodes even after swapoff.
        if: matrix.target == 'aarch64-unknown-linux-gnu' && !matrix.use_cross
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=12288 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          swapon --show

      - name: Set aarch64-linux-gnu release profile (link-time memory budget)
        # The 463k-LOC tree's release profile uses `lto = "fat"` +
        # `codegen-units = 1` (Cargo.toml). Fat LTO holds the WHOLE
        # program's LLVM IR in memory and optimizes it as a single
        # module — peak RSS exceeds the ubuntu-24.04-arm runner's ~7 GB
        # RAM and OOM-kills rustc mid-link ("runner lost communication").
        # A system-linker swap (mold/lld) does NOT help: the memory is
        # spent in LLVM's LTO pass, not the final `ld` invocation.
        #
        # Override ONLY this target to `lto = "thin"` + `codegen-units = 16`:
        # thin LTO optimizes each module independently (parallel, bounded
        # peak memory) and gives ~95% of fat-LTO runtime perf. The
        # --no-keep-memory / --reduce-memory-overheads flags still trim the
        # final link's RSS; debug=0 drops debug sections (binary is
        # stripped in Package anyway).
        if: matrix.target == 'aarch64-unknown-linux-gnu' && !matrix.use_cross
        run: |
          {
            echo 'CARGO_PROFILE_RELEASE_DEBUG=0'
            echo 'CARGO_PROFILE_RELEASE_LTO=thin'
            echo 'CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16'
            echo 'RUSTFLAGS=-C link-arg=-Wl,--no-keep-memory -C link-arg=-Wl,--reduce-memory-overheads'
          } >> "$GITHUB_ENV"

      - name: Install cross
        if: matrix.use_cross
        run: |
          # Prefer the prebuilt binary release over `cargo install`
          # to save ~5 min of compile time per cross-build runner.
          CROSS_VER="v0.2.5"
          curl -sSLf -o /tmp/cross.tar.gz \
            "https://github.com/cross-rs/cross/releases/download/${CROSS_VER}/cross-x86_64-unknown-linux-gnu.tar.gz"
          tar -C /tmp -xzf /tmp/cross.tar.gz
          sudo install -m 755 /tmp/cross /usr/local/bin/cross

      - name: Build (native)
        if: '!matrix.use_cross'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          strip stryke 2>/dev/null || true
          strip st 2>/dev/null || true
          strip s 2>/dev/null || true
          tar czf ../../../stryke-${{ github.ref_name }}-${{ matrix.target }}.tar.gz stryke st s
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: stryke-${{ matrix.target }}
          path: stryke-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  plugin:
    name: Build IntelliJ plugin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: editors/intellij
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'

      - name: Cache Gradle + IntelliJ Platform SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            editors/intellij/.intellijPlatform
          key: ${{ runner.os }}-gradle-${{ hashFiles('editors/intellij/build.gradle.kts', 'editors/intellij/gradle.properties', 'editors/intellij/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build plugin zip
        # -x test skips the test task (covered by CI's IntelliJ plugin
        # tests job). -x buildSearchableOptions skips heavy IDE indexing.
        run: ./gradlew buildPlugin --no-daemon -x test -x buildSearchableOptions

      - name: Locate plugin zip
        id: plugin_zip
        run: |
          zip_path=$(ls build/distributions/*.zip | head -1)
          echo "path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $zip_path)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: stryke-intellij-plugin
          path: editors/intellij/${{ steps.plugin_zip.outputs.path }}

  publish:
    name: Publish Release
    needs: [build, plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Attach BOTH the Rust binary tarballs (per-target) and the
          # IntelliJ plugin zip (single file from the `plugin` job).
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz artifacts/*.zip

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        shell: bash
        run: |
          for f in artifacts/*.tar.gz; do
            base=$(basename "$f")
            sum=$(sha256sum "$f" | awk '{print $1}')
            # e.g. stryke-v0.7.8-aarch64-apple-darwin.tar.gz → aarch64_apple_darwin
            key=$(echo "$base" | sed 's/stryke-v[^-]*-//; s/\.tar\.gz//; s/-/_/g; s/\./_/g')
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v4
        with:
          repository: MenkeTechnologies/homebrew-menketech
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        env:
          MAC_ARM:   ${{ steps.sha.outputs.aarch64_apple_darwin }}
          MAC_INTEL: ${{ steps.sha.outputs.x86_64_apple_darwin }}
          LIN_ARM:   ${{ steps.sha.outputs.aarch64_unknown_linux_gnu }}
          LIN_INTEL: ${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd tap

          # A `bottle` block (`on_arm`/`on_intel`) for a target whose build
          # leg failed would otherwise be written with an empty sha256,
          # producing a formula that errors on `brew install` for that
          # platform. Emit a block ONLY when its sha is present; skip the
          # platform otherwise so the formula stays valid everywhere else.
          dl="https://github.com/MenkeTechnologies/strykelang/releases/download/v${VERSION}"

          # macOS arm is the primary target — a missing binary there is a
          # release failure, not a platform to silently drop.
          if [ -z "$MAC_ARM" ]; then
            echo "::error::aarch64-apple-darwin binary missing — refusing to ship a broken formula" >&2
            exit 1
          fi

          block() {  # $1=os_guard ($2=arm sha) ($3=intel sha) $4=arm target $5=intel target
            local guard="$1" arm_sha="$2" intel_sha="$3" arm_t="$4" intel_t="$5"
            [ -z "$arm_sha$intel_sha" ] && return 0
            echo "  on_${guard} do"
            if [ -n "$arm_sha" ]; then
              printf '    on_arm do\n      url "%s/stryke-v%s-%s.tar.gz"\n      sha256 "%s"\n    end\n' "$dl" "$VERSION" "$arm_t" "$arm_sha"
            fi
            if [ -n "$intel_sha" ]; then
              printf '    on_intel do\n      url "%s/stryke-v%s-%s.tar.gz"\n      sha256 "%s"\n    end\n' "$dl" "$VERSION" "$intel_t" "$intel_sha"
            fi
            echo "  end"
            echo
          }

          {
            cat << 'HEAD'
          class Stryke < Formula
            desc "The 2nd fastest dynamic language — parallel Perl 5 interpreter in Rust"
            homepage "https://github.com/MenkeTechnologies/strykelang"
            license "MIT"
          HEAD
            echo "  version \"${VERSION}\""
            echo
            block macos "$MAC_ARM" "$MAC_INTEL" aarch64-apple-darwin x86_64-apple-darwin
            block linux "$LIN_ARM" "$LIN_INTEL" aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu
            cat << 'TAIL'
            def install
              bin.install "stryke"
              bin.install "st"
              bin.install "s"
            end

            test do
              assert_match "hello", shell_output("#{bin}/s -e 'print \"hello\"'")
            end
          end
          TAIL
          } > Formula/stryke.rb

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/stryke.rb
          git commit -m "update stryke to ${GITHUB_REF_NAME}"
          git push
