name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          strip stryke 2>/dev/null || true
          strip st 2>/dev/null || true
          strip s 2>/dev/null || true
          tar czf ../../../stryke-${{ github.ref_name }}-${{ matrix.target }}.tar.gz stryke st s
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: stryke-${{ matrix.target }}
          path: stryke-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz

  crates-io:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        shell: bash
        run: |
          for f in artifacts/*.tar.gz; do
            base=$(basename "$f")
            sum=$(sha256sum "$f" | awk '{print $1}')
            # e.g. stryke-v0.7.8-aarch64-apple-darwin.tar.gz → aarch64_apple_darwin
            key=$(echo "$base" | sed 's/stryke-v[^-]*-//; s/\.tar\.gz//; s/-/_/g; s/\./_/g')
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v4
        with:
          repository: MenkeTechnologies/homebrew-stryke
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd tap
          cat > Formula/stryke.rb << 'FORMULA'
          class Stryke < Formula
            desc "The 2nd fastest dynamic language — parallel Perl 5 interpreter in Rust"
            homepage "https://github.com/MenkeTechnologies/strykelang"
            license "MIT"
          FORMULA
          cat >> Formula/stryke.rb << EOF
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/MenkeTechnologies/strykelang/releases/download/v${VERSION}/stryke-v${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.aarch64_apple_darwin }}"
              end
              on_intel do
                url "https://github.com/MenkeTechnologies/strykelang/releases/download/v${VERSION}/stryke-v${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.x86_64_apple_darwin }}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/MenkeTechnologies/strykelang/releases/download/v${VERSION}/stryke-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.aarch64_unknown_linux_gnu }}"
              end
              on_intel do
                url "https://github.com/MenkeTechnologies/strykelang/releases/download/v${VERSION}/stryke-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}"
              end
            end

            def install
              bin.install "stryke"
              bin.install "st"
              bin.install "s"
            end

            test do
              assert_match "hello", shell_output("#{bin}/s -e 'print \"hello\"'")
            end
          end
          EOF

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/stryke.rb
          git commit -m "update stryke to ${GITHUB_REF_NAME}"
          git push
