name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --locked

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # No-op on macOS via runner.os guard inside the composite action.
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --no-fail-fast

  # Formatting is handled by the pre-commit hook in `.githooks/pre-commit`
  # (auto-runs `cargo fmt` on staged .rs files). No CI enforcement — fmt
  # drift is cosmetic, not a bug. Clippy is removed entirely; lints are
  # often opinionated and drown out real-bug signal.

  doc:
    name: Doc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --locked

  parity:
    name: Parity vs system perl
    runs-on: ubuntu-latest
    # Budget, measured on this runner: ~35m cold `cargo build --release` +
    # ~1s per parity case (~25m for the current corpus) = ~60m. 90 leaves
    # headroom without inheriting GitHub's 6h default, which is how the
    # oversized _p3/_p4/_p5 corpus burned a full 6h job every run.
    #
    # Do not cut this below the cold-build time: a cap that kills the build
    # also skips rust-cache's save step, so the next run is cold again and
    # the job can never recover on its own.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Compare stryke output to perl on parity/cases
        # Exit code is the signal: any mismatch fails the step, fails the
        # job, and blocks the release-build chain via `needs: [parity]`.
        # `--summary` keeps the CI log small (totals + short FAIL lines);
        # the full per-case diff lives in parity_failures.log uploaded below.
        run: bash parity/run_parity.sh --summary
        env:
          ST: ${{ github.workspace }}/target/release/st
      - name: Upload parity failure log
        # `if: always()` so we capture the log even when the step fails —
        # that's exactly when the diffs are useful for triage.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-failures
          path: parity/parity_failures.log
          if-no-files-found: ignore
          retention-days: 30

  stryke-test:
    name: Stryke project tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Examples CI (parse, run, demos, project, rosetta, exercism, ruby, scheme)
        # Single stryke orchestrator replaces the former seven separate steps.
        # All phases run in parallel (pmaps); each phase parallelizes its own
        # files (pmap/pmaps/test worker pool). Uses in-process check/test where
        # possible instead of spawning stryke per file for syntax checks.
        env:
          ST: ${{ github.workspace }}/target/release/stryke
        run: ./target/release/stryke examples/run_all_ci.stk --summary

  intellij-plugin:
    name: IntelliJ plugin tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: editors/intellij
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'
      - name: Cache Gradle
        # Caches ~/.gradle/caches AND ~/.gradle/wrapper so the IntelliJ
        # platform JARs (~500MB) don't redownload every CI run.
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            editors/intellij/.intellijPlatform
          key: ${{ runner.os }}-gradle-${{ hashFiles('editors/intellij/build.gradle.kts', 'editors/intellij/gradle.properties', 'editors/intellij/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Run JUnit tests (lexer, ColorSettingsPage demo coverage)
        # `--no-daemon` keeps the gradle process from sticking around
        # for CI; `-x buildSearchableOptions` skips the heavy IDE
        # indexing pass — we only need the test task.
        run: ./gradlew test --no-daemon -x buildSearchableOptions
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin-test-results
          path: editors/intellij/build/test-results/test/
          retention-days: 14

  release-build:
    name: Release Build
    # Only blocks on real-bug signals. fmt / clippy are advisory (see
    # their `continue-on-error`); listing them here would make the entire
    # release pipeline wait on cosmetic lints.
    needs: [check, test, doc, parity, stryke-test, intellij-plugin]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # No-op on macOS via runner.os guard in the composite action.
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: stryke-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/stryke
            target/${{ matrix.target }}/release/st

  docs-gates:
    name: Docs gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-target-blank-rel-noopener.sh
      - run: bash tests/docs-no-http-links.sh
      - run: bash tests/docs-no-inline-handlers.sh

  polish-gates:
    name: Polish gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/man-page-no-trailing-whitespace.sh
      - run: bash tests/man-page-final-newline.sh
      - run: bash tests/man-page-synopsis-section.sh
      - run: bash tests/tests-shell-executable.sh
      - run: bash tests/tests-shell-shebang.sh

  semantic-gates:
    name: Semantic gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-has-h1.sh
      - run: bash tests/docs-no-deprecated-tags.sh
      - run: bash tests/docs-no-placeholder-href.sh

  newline-gates:
    name: Newline + README gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/readme-final-newline.sh
      - run: bash tests/docs-final-newline.sh
      - run: bash tests/workflow-final-newline.sh
      - run: bash tests/cargo-final-newline.sh
      - run: bash tests/readme-has-https-link.sh

  structure-gates:
    name: Structure gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/readme-has-h2-section.sh
      - run: bash tests/readme-has-badges.sh
      - run: bash tests/docs-has-html-closing.sh
      - run: bash tests/docs-has-body-tag.sh
      - run: bash tests/workflow-no-tabs.sh
