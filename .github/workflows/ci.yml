name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --locked

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --no-fail-fast

  # Formatting is handled by the pre-commit hook in `.githooks/pre-commit`
  # (auto-runs `cargo fmt` on staged .rs files). No CI enforcement — fmt
  # drift is cosmetic, not a bug. Clippy is removed entirely; lints are
  # often opinionated and drown out real-bug signal.

  doc:
    name: Doc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --locked

  parity:
    name: Parity vs system perl
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Compare stryke output to perl on parity/cases
        # Exit code is the signal: any mismatch fails the step, fails the
        # job, and blocks the release-build chain via `needs: [parity]`.
        # `--summary` keeps the CI log small (totals + short FAIL lines);
        # the full per-case diff lives in parity_failures.log uploaded below.
        run: bash parity/run_parity.sh --summary
        env:
          ST: ${{ github.workspace }}/target/release/st
      - name: Upload parity failure log
        # `if: always()` so we capture the log even when the step fails —
        # that's exactly when the diffs are useful for triage.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-failures
          path: parity/parity_failures.log
          if-no-files-found: ignore
          retention-days: 30

  stryke-test:
    name: Stryke project tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Run stryke test on example project
        run: ./target/release/s test examples/project/t
      - name: Run stryke test on rosetta project
        run: ./target/release/s test examples/rosetta/t
      - name: Run stryke test on exercism project
        # Each exercise is its own dir with `t/test_*.stk` inside, where
        # the test does `require "./Module.stk"`. The script cds into each
        # before invoking `s test t` so the relative require resolves.
        env:
          ST: ${{ github.workspace }}/target/release/s
        run: bash examples/exercism_run_all.sh --summary

  release-build:
    name: Release Build
    # Only blocks on real-bug signals. fmt / clippy are advisory (see
    # their `continue-on-error`); listing them here would make the entire
    # release pipeline wait on cosmetic lints.
    needs: [check, test, doc, parity, stryke-test]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: stryke-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/stryke
            target/${{ matrix.target }}/release/st
