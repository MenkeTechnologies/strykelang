name: "Install Linux GUI deps"
description: >-
  Installs the Wayland + Mesa GL/EGL + X11 dev stack needed by xcap
  + enigo on Ubuntu runners. Required for any job that runs `cargo
  build`, `cargo check`, `cargo test`, or `cargo doc` on Linux.

  Probes discovered iteratively (v0.16.24 → v0.16.29):
    wayland-client, libxkbcommon, libpipewire-0.3, egl, libxcb,
    libxrandr, libdbus. Installing the full stack up-front to
    stop the whack-a-mole bp cycle.

  No-op when invoked on non-Linux runners — guards with a runner.os
  check so the same `uses:` line works on macOS jobs too.

runs:
  using: composite
  steps:
    - if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libwayland-dev libxkbcommon-dev libwayland-egl1 \
          libpipewire-0.3-dev libspa-0.2-dev \
          libegl-dev libgl1-mesa-dev libgles-dev libgbm-dev \
          libxcb1-dev libxrandr-dev libxcb-randr0-dev \
          libxinerama-dev libxcursor-dev libxi-dev \
          libdbus-1-dev libudev-dev \
          pkg-config
