[package]
name = "perlrs"
version = "0.1.8"
edition = "2021"
description = "A highly parallel Perl 5 interpreter written in Rust"
license = "MIT"
authors = ["MenkeTechnologies"]
repository = "https://github.com/MenkeTechnologies/perlrs"
documentation = "https://docs.rs/perlrs"
# Ensure `cargo package` / crates.io tarballs ship `vendor/perl` (e.g. `List/Util.pm`).
include = ["src/**/*", "vendor/**/*", "tests/**/*", "Cargo.toml", "README.md", "LICENSE*"]

[[bin]]
name = "perlrs"
path = "src/main.rs"

[[bin]]
name = "pe"
path = "src/main.rs"

[dependencies]
rayon = "1.10"
regex = "1.11"
clap = { version = "4", features = ["derive"] }
crossbeam = "0.8"
parking_lot = "0.12"
dashmap = "6"
indexmap = "2"
thiserror = "2"
itoa = "1"
rand = "0.8"
caseless = "0.2"
libc = "0.2"
glob = "0.3"
ureq = "2.9"
memmap2 = "0.9"
notify = "6.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
csv = "1.3"
rusqlite = { version = "0.32", features = ["bundled"] }
rustyline = "14"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 1
